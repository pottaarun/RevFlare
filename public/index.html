<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RevFlare — Cloudflare Sales Intelligence</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Cloudflare_Logo.svg/3840px-Cloudflare_Logo.svg.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="top-banner" style="background:rgba(94,106,210,0.08);border-bottom:1px solid rgba(124,127,255,0.12);padding:6px 32px;text-align:center;font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:-0.1px">Bug or feedback? Report to <strong style="color:var(--text-secondary)">Arun Potta</strong></div>
    <nav id="nav">
      <div class="nav-inner">
        <a href="#/" class="nav-brand">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Cloudflare_Logo.svg/3840px-Cloudflare_Logo.svg.png" alt="Cloudflare" style="height:22px;filter:brightness(0) invert(1);opacity:0.9" />
          <span style="color:var(--text-muted);font-weight:400;margin:0 4px">|</span>
          <span>RevFlare</span>
        </a>
        <div class="nav-links">
          <a href="#/" class="nav-link" data-route="dashboard">Dashboard</a>
          <a href="#/campaigns" class="nav-link" data-route="campaigns">Campaigns</a>
          <a href="#/upload" class="nav-link" data-route="upload">Upload</a>
        </div>
        <div class="nav-right">
          <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px" id="gmail-setup-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:4px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            Connect Gmail
          </button>
          <script>
          document.getElementById('gmail-setup-btn').addEventListener('click', function() {
            var ov = document.createElement('div');
            ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
            var redirectUri = location.origin + '/api/gmail/callback';
            var inputStyle = 'width:100%;background:#08090a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:10px 12px;font-size:13px;color:#f7f8f8;font-family:monospace;outline:none;margin-top:6px';
            ov.innerHTML = '<div style="background:#161718;border:1px solid rgba(255,255,255,0.06);border-radius:14px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;color:#c4c9d4;font-family:Inter,sans-serif">'
              + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="color:#f7f8f8;font-size:20px;font-weight:700;margin:0">Connect Gmail</h2><button id="wiz-close" style="background:none;border:none;color:#5a5e66;cursor:pointer;font-size:20px">\u2715</button></div>'
              + '<div style="background:rgba(94,106,210,0.08);border:1px solid rgba(124,127,255,0.15);border-radius:10px;padding:14px;margin-bottom:20px;font-size:13px">Send emails directly from your Gmail. Secure OAuth &mdash; send-only permission.</div>'

              // Step 1-3: Instructions
              + '<div style="margin-bottom:16px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px">'
              + '<div style="color:#60a5fa;font-weight:700;font-size:12px;margin-bottom:8px">1. CREATE GOOGLE OAUTH CREDENTIALS</div>'
              + '<div style="font-size:13px;line-height:1.7">'
              + '\u2022 Go to <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:#7c7fff">Google Cloud Console &rarr; Credentials</a><br>'
              + '\u2022 Create project named <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:11px">RevFlare</code> if needed<br>'
              + '\u2022 Enable <strong>Gmail API</strong> (APIs &rarr; Library &rarr; Gmail API &rarr; Enable)<br>'
              + '\u2022 Set up <strong>OAuth consent screen</strong> (External, add your email as test user)<br>'
              + '\u2022 Create <strong>OAuth client ID</strong> (Web application)<br>'
              + '\u2022 Add this <strong>Redirect URI</strong>:'
              + '</div>'
              + '<div id="wiz-uri" style="background:#08090a;padding:10px;border-radius:6px;margin-top:6px;font-family:monospace;font-size:12px;color:#7c7fff;cursor:pointer;border:1px solid rgba(255,255,255,0.06)">' + redirectUri + ' <span style="opacity:0.4;margin-left:8px">click to copy</span></div>'
              + '</div>'

              // Step 2: Paste credentials
              + '<div style="margin-bottom:16px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px">'
              + '<div style="color:#34d399;font-weight:700;font-size:12px;margin-bottom:8px">2. PASTE YOUR CREDENTIALS</div>'
              + '<label style="font-size:12px;color:#8a8f98;font-weight:600">Google Client ID</label>'
              + '<input type="text" id="wiz-client-id" placeholder="xxxxxxxxxx.apps.googleusercontent.com" style="' + inputStyle + '" />'
              + '<label style="font-size:12px;color:#8a8f98;font-weight:600;margin-top:12px;display:block">Google Client Secret</label>'
              + '<input type="password" id="wiz-client-secret" placeholder="GOCSPX-xxxxxxxxxx" style="' + inputStyle + '" />'
              + '<div id="wiz-save-status" style="margin-top:10px;font-size:12px"></div>'
              + '<button id="wiz-save-btn" style="width:100%;margin-top:12px;padding:10px;background:linear-gradient(135deg,#34d399,#10b981);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">Save Credentials</button>'
              + '</div>'

              // Step 3: Connect
              + '<div style="padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;margin-bottom:16px">'
              + '<div style="color:#a78bfa;font-weight:700;font-size:12px;margin-bottom:8px">3. AUTHORIZE YOUR GMAIL</div>'
              + '<div style="font-size:13px;color:#8a8f98;margin-bottom:12px">After saving credentials above, click to authorize:</div>'
              + '<a href="/api/gmail/connect" target="_blank" id="wiz-auth-btn" style="display:block;text-align:center;padding:12px;background:linear-gradient(135deg,#5e6ad2,#7c6ae0);color:#fff;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none">Authorize Gmail Now</a>'
              + '</div>'

              + '<div style="text-align:center;font-size:11px;color:#5a5e66">Credentials are stored securely in the database. After authorizing, refresh the page.</div>'
              + '</div>';
            document.body.appendChild(ov);
            document.getElementById('wiz-close').onclick = function() { ov.remove(); };
            document.getElementById('wiz-uri').onclick = function() { navigator.clipboard.writeText(redirectUri); this.style.borderColor='#34d399'; var sp=this.querySelector('span'); if(sp)sp.textContent='Copied!'; };
            ov.onclick = function(e) { if (e.target === ov) ov.remove(); };

            // Check if creds are already saved
            fetch('/api/settings/status').then(function(r){return r.json()}).then(function(d) {
              if (d.google_client_id && d.google_client_secret) {
                document.getElementById('wiz-save-status').innerHTML = '<span style="color:#34d399">\u2713 Credentials already saved. You can authorize below or update them.</span>';
              }
            }).catch(function(){});

            // Save button
            document.getElementById('wiz-save-btn').addEventListener('click', function() {
              var cid = document.getElementById('wiz-client-id').value.trim();
              var csec = document.getElementById('wiz-client-secret').value.trim();
              var statusEl = document.getElementById('wiz-save-status');
              if (!cid || !csec) { statusEl.innerHTML = '<span style="color:#f87171">Enter both Client ID and Client Secret</span>'; return; }
              var btn = document.getElementById('wiz-save-btn');
              btn.textContent = 'Saving...'; btn.disabled = true;
              Promise.all([
                fetch('/api/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key:'google_client_id',value:cid})}),
                fetch('/api/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key:'google_client_secret',value:csec})}),
              ]).then(function() {
                statusEl.innerHTML = '<span style="color:#34d399">\u2713 Credentials saved! Now click "Authorize Gmail Now" below.</span>';
                btn.textContent = '\u2713 Saved'; btn.style.background = '#1e1f21'; btn.style.color = '#34d399';
              }).catch(function(e) {
                statusEl.innerHTML = '<span style="color:#f87171">Failed: ' + e.message + '</span>';
                btn.textContent = 'Save Credentials'; btn.disabled = false;
              });
            });
          });
          </script>
          <span class="nav-stat" id="nav-stat" style="display:none"></span>
        </div>
      </div>
    </nav>
    <main id="main"></main>
    <div id="platform-bar" style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,16,17,0.85);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.04);padding:8px 32px;display:flex;align-items:center;justify-content:center;gap:24px;font-size:11px;font-weight:600;z-index:90"></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
