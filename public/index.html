<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RevFlare — Cloudflare Sales Intelligence</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Cloudflare_Logo.svg/3840px-Cloudflare_Logo.svg.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="top-banner" style="background:rgba(94,106,210,0.08);border-bottom:1px solid rgba(124,127,255,0.12);padding:6px 32px;text-align:center;font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:-0.1px">Bug or feedback? Report to <strong style="color:var(--text-secondary)">Arun Potta</strong></div>
    <nav id="nav">
      <div class="nav-inner">
        <a href="#/" class="nav-brand">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Cloudflare_Logo.svg/3840px-Cloudflare_Logo.svg.png" alt="Cloudflare" style="height:22px;filter:brightness(0) invert(1);opacity:0.9" />
          <span style="color:var(--text-muted);font-weight:400;margin:0 4px">|</span>
          <span>RevFlare</span>
        </a>
        <div class="nav-links">
          <a href="#/" class="nav-link" data-route="dashboard">Dashboard</a>
          <a href="#/campaigns" class="nav-link" data-route="campaigns">Campaigns</a>
          <a href="#/upload" class="nav-link" data-route="upload">Upload</a>
        </div>
        <div class="nav-right">
          <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:4px 10px" id="gmail-setup-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:4px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            Connect Gmail
          </button>
          <script>
          document.getElementById('gmail-setup-btn').addEventListener('click', function() {
            // Inline wizard - does not depend on app.js loading
            var ov = document.createElement('div');
            ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
            var redirectUri = location.origin + '/api/gmail/callback';
            ov.innerHTML = '<div style="background:#161718;border:1px solid rgba(255,255,255,0.06);border-radius:14px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;color:#c4c9d4;font-family:Inter,sans-serif">'
              + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><h2 style="color:#f7f8f8;font-size:20px;font-weight:700;margin:0">Connect Gmail to RevFlare</h2><button id="wiz-close" style="background:none;border:none;color:#5a5e66;cursor:pointer;font-size:20px">\u2715</button></div>'
              + '<div style="background:rgba(94,106,210,0.08);border:1px solid rgba(124,127,255,0.15);border-radius:10px;padding:16px;margin-bottom:24px;font-size:13px">Send AI-generated emails directly from your Gmail. Secure OAuth &mdash; we only get send permission, never read your inbox.</div>'
              + '<h3 style="color:#f7f8f8;font-size:15px;font-weight:700;margin:0 0 16px">Setup Steps</h3>'
              + '<div style="margin-bottom:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px"><div style="color:#60a5fa;font-weight:700;font-size:12px;margin-bottom:6px">STEP 1: Google Cloud Console</div><div style="font-size:13px">Go to <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:#7c7fff">console.cloud.google.com/apis/credentials</a>. Create a project named <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:11px">RevFlare</code> if needed.</div></div>'
              + '<div style="margin-bottom:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px"><div style="color:#a78bfa;font-weight:700;font-size:12px;margin-bottom:6px">STEP 2: Enable Gmail API</div><div style="font-size:13px">APIs &amp; Services &rarr; Library &rarr; search <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:11px">Gmail API</code> &rarr; Enable</div></div>'
              + '<div style="margin-bottom:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px"><div style="color:#34d399;font-weight:700;font-size:12px;margin-bottom:6px">STEP 3: OAuth Consent Screen</div><div style="font-size:13px">APIs &amp; Services &rarr; OAuth consent screen &rarr; External &rarr; App name: <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:11px">RevFlare</code> &rarr; Add your email as test user &rarr; Save</div></div>'
              + '<div style="margin-bottom:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px"><div style="color:#fbbf24;font-weight:700;font-size:12px;margin-bottom:6px">STEP 4: Create OAuth Client ID</div><div style="font-size:13px">Credentials &rarr; + Create Credentials &rarr; OAuth client ID &rarr; Web application &rarr; Name: <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:11px">RevFlare</code></div><div style="margin-top:8px;font-size:12px;font-weight:700;color:#34d399">Redirect URI (click to copy):</div><div id="wiz-uri" style="background:#08090a;padding:10px;border-radius:6px;margin-top:4px;font-family:monospace;font-size:12px;color:#7c7fff;cursor:pointer;border:1px solid rgba(255,255,255,0.06)">' + redirectUri + '</div></div>'
              + '<div style="margin-bottom:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px"><div style="color:#f472b6;font-weight:700;font-size:12px;margin-bottom:6px">STEP 5: Store Secrets</div><div style="font-size:13px">Run in terminal:</div><div style="background:#08090a;padding:10px;border-radius:6px;margin-top:6px;font-family:monospace;font-size:11px;color:#f7f8f8;line-height:2;border:1px solid rgba(255,255,255,0.06)">npx wrangler secret put GOOGLE_CLIENT_ID<br>npx wrangler secret put GOOGLE_CLIENT_SECRET</div></div>'
              + '<a href="/api/gmail/connect" target="_blank" style="display:block;text-align:center;padding:14px;background:linear-gradient(135deg,#5e6ad2,#7c6ae0);color:#fff;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none;margin-top:20px">Authorize Gmail Now</a>'
              + '<div style="text-align:center;font-size:11px;color:#5a5e66;margin-top:10px">If secrets are not set yet, this will show an error. Set them first, then click Authorize.</div>'
              + '</div>';
            document.body.appendChild(ov);
            document.getElementById('wiz-close').onclick = function() { ov.remove(); };
            document.getElementById('wiz-uri').onclick = function() { navigator.clipboard.writeText(redirectUri); this.style.borderColor = '#34d399'; this.textContent = 'Copied!'; };
            ov.onclick = function(e) { if (e.target === ov) ov.remove(); };
          });
          </script>
          <span class="nav-stat" id="nav-stat" style="display:none"></span>
        </div>
      </div>
    </nav>
    <main id="main"></main>
    <div id="platform-bar" style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,16,17,0.85);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.04);padding:8px 32px;display:flex;align-items:center;justify-content:center;gap:24px;font-size:11px;font-weight:600;z-index:90"></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
